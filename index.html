<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EML to TXT Converter</title>
    <!-- Load Tailwind CSS via CDN for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Load JSZip for creating the zip file -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Custom styling to enhance Tailwind's defaults -->
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f3f4f6; /* Gray-100 */
        }
        /* Custom scrollbar for the file list */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-2xl">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">EML to TXT Converter</h1>
            <p class="text-gray-500">Extract email bodies from EML files and download as a ZIP archive.</p>
        </div>

        <!-- Drag & Drop Zone / File Input -->
        <div id="dropZone" class="border-2 border-dashed border-blue-300 rounded-xl p-8 text-center transition-colors duration-200 hover:bg-blue-50 cursor-pointer mb-6 group">
            <svg class="mx-auto h-12 w-12 text-blue-400 group-hover:text-blue-500 mb-4 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <p class="text-lg font-medium text-gray-700">Click to select EML files</p>
            <p class="text-sm text-gray-500 mt-1">or drag and drop them here</p>
            <p class="text-xs text-gray-400 mt-2">Supports hundreds of files</p>
            
            <!-- Hidden file input -->
            <input type="file" id="fileInput" multiple accept=".eml" class="hidden">
        </div>

        <!-- Status & File List -->
        <div id="statusContainer" class="hidden mb-6">
            <div class="flex justify-between items-center mb-2">
                <span id="fileCount" class="font-medium text-gray-700">0 files selected</span>
                <button id="clearBtn" class="text-sm text-red-500 hover:text-red-700 transition-colors">Clear Selection</button>
            </div>
            
            <!-- File List Preview (Scrollable) -->
            <ul id="fileList" class="bg-gray-50 rounded-lg border border-gray-200 h-32 overflow-y-auto p-2 custom-scrollbar space-y-1">
                <!-- List items will be injected here via JS -->
            </ul>

            <!-- Progress Bar (Hidden by default) -->
            <div id="progressContainer" class="hidden mt-4">
                <div class="flex justify-between text-sm text-gray-600 mb-1">
                    <span id="progressText">Converting...</span>
                    <span id="progressPercent">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2.5">
                    <div id="progressBar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- Convert Button -->
        <button id="convertBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-xl shadow-md transition-all duration-200 transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none hidden">
            Convert & Download ZIP
        </button>
    </div>

    <script>
        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const statusContainer = document.getElementById('statusContainer');
        const fileCountSpan = document.getElementById('fileCount');
        const fileListUL = document.getElementById('fileList');
        const clearBtn = document.getElementById('clearBtn');
        const convertBtn = document.getElementById('convertBtn');
        
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const progressPercent = document.getElementById('progressPercent');

        let selectedFiles = [];

        // Event Listeners for UI interaction
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and Drop implementation
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('bg-blue-100', 'border-blue-500'));
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('bg-blue-100', 'border-blue-500'));
        });

        dropZone.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFileSelect, false);
        clearBtn.addEventListener('click', clearSelection);
        convertBtn.addEventListener('click', processFiles);

        // File Handling Functions
        function handleDrop(e) {
            let dt = e.dataTransfer;
            let files = dt.files;
            addFiles(files);
        }

        function handleFileSelect(e) {
            let files = e.target.files;
            addFiles(files);
        }

        function addFiles(fileList) {
            // Filter only .eml files
            const newFiles = Array.from(fileList).filter(file => file.name.toLowerCase().endsWith('.eml'));
            
            if (newFiles.length === 0) {
                alert("Please select valid .eml files.");
                return;
            }

            selectedFiles = [...selectedFiles, ...newFiles];
            updateUI();
        }

        function clearSelection() {
            selectedFiles = [];
            fileInput.value = ""; // Reset input
            updateUI();
        }

        function updateUI() {
            if (selectedFiles.length > 0) {
                statusContainer.classList.remove('hidden');
                convertBtn.classList.remove('hidden');
                convertBtn.disabled = false;
                fileCountSpan.textContent = `${selectedFiles.length} file(s) selected`;
                
                // Update file list preview
                fileListUL.innerHTML = '';
                selectedFiles.slice(0, 100).forEach(file => { // Show up to 100 for performance
                    const li = document.createElement('li');
                    li.className = 'text-sm text-gray-600 truncate';
                    li.textContent = `📄 ${file.name}`;
                    fileListUL.appendChild(li);
                });
                
                if (selectedFiles.length > 100) {
                    const li = document.createElement('li');
                    li.className = 'text-sm text-gray-400 italic';
                    li.textContent = `... and ${selectedFiles.length - 100} more`;
                    fileListUL.appendChild(li);
                }
                
                // Reset progress bar state
                progressContainer.classList.add('hidden');
                progressBar.style.width = '0%';
                
            } else {
                statusContainer.classList.add('hidden');
                convertBtn.classList.add('hidden');
            }
        }

        // --- EML Parsing Logic ---
        // This is a lightweight parser designed specifically to extract the plain-text body
        // and ignore headers/HTML parts for this specific use case.
        function parseEmlBody(emlText) {
            // 1. Separate headers from the main body using the standard double newline
            const boundaryMatch = emlText.match(/^Content-Type:.*boundary="?([^";]+)"?/im);
            const doubleNewlineIndex = emlText.indexOf('\r\n\r\n') !== -1 ? emlText.indexOf('\r\n\r\n') : emlText.indexOf('\n\n');
            
            if (doubleNewlineIndex === -1) return "Could not parse email body.";

            let rawBody = emlText.substring(doubleNewlineIndex).trim();

            // 2. Handle Multipart emails
            if (boundaryMatch && boundaryMatch[1]) {
                const boundary = boundaryMatch[1];
                // Split by boundary
                const parts = rawBody.split(`--${boundary}`);
                
                // Try to find the plain text part
                for (let part of parts) {
                    if (part.includes('Content-Type: text/plain')) {
                        return extractContentFromPart(part);
                    }
                }
                
                // If no plain text found, try to fallback to HTML and strip tags (basic fallback)
                for (let part of parts) {
                    if (part.includes('Content-Type: text/html')) {
                        let htmlContent = extractContentFromPart(part);
                        // Very basic HTML stripping
                        return htmlContent.replace(/<[^>]*>?/gm, '').replace(/&nbsp;/g, ' ').trim();
                    }
                }
                return "No text/plain or text/html content found in this multipart email.";
            }

            // 3. Handle single part emails (Not multipart)
            // Just return everything after the headers
            return rawBody;
        }

        function extractContentFromPart(part) {
            // Find where headers of this part end
            const doubleNewlineIndex = part.indexOf('\r\n\r\n') !== -1 ? part.indexOf('\r\n\r\n') : part.indexOf('\n\n');
            if (doubleNewlineIndex === -1) return part.trim();

            let contentHeaders = part.substring(0, doubleNewlineIndex);
            let contentBody = part.substring(doubleNewlineIndex).trim();

            // Handle Quoted-Printable encoding if present
            if (contentHeaders.includes('Content-Transfer-Encoding: quoted-printable')) {
                return decodeQuotedPrintable(contentBody);
            }
            
            // Handle Base64 encoding if present
            if (contentHeaders.includes('Content-Transfer-Encoding: base64')) {
                try {
                     return atob(contentBody.replace(/\s/g, ''));
                } catch(e) {
                     return contentBody; // Fallback if base64 fails
                }
            }

            return contentBody;
        }

        // Basic decoder for quoted-printable
        function decodeQuotedPrintable(str) {
            str = str.replace(/=\r?\n/g, ''); // Soft line breaks
            return str.replace(/=([a-fA-F0-9]{2})/g, function(match, hex) {
                return String.fromCharCode(parseInt(hex, 16));
            });
        }

        // --- Main Processing Function ---
        async function processFiles() {
            if (selectedFiles.length === 0) return;

            convertBtn.disabled = true;
            convertBtn.textContent = 'Processing...';
            progressContainer.classList.remove('hidden');
            
            const zip = new JSZip();
            const totalFiles = selectedFiles.length;
            let processedCount = 0;

            for (let i = 0; i < totalFiles; i++) {
                const file = selectedFiles[i];
                try {
                    // Read file content
                    const text = await file.text();
                    
                    // Parse EML to get body text
                    const bodyText = parseEmlBody(text);
                    
                    // Create a safe filename by replacing .eml with .txt
                    let safeName = file.name.replace(/\.eml$/i, '.txt');
                    
                    // Add to zip
                    zip.file(safeName, bodyText);

                } catch (error) {
                    console.error(`Error processing ${file.name}:`, error);
                    // Add error note in the txt file if it fails
                    zip.file(file.name.replace(/\.eml$/i, '_error.txt'), `Error converting file: ${error.message}`);
                }

                // Update Progress UI
                processedCount++;
                const percent = Math.round((processedCount / totalFiles) * 100);
                progressBar.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
                progressText.textContent = `Converting ${processedCount} of ${totalFiles}...`;

                // Small delay to allow UI to update during heavy processing
                if (i % 10 === 0) {
                     await new Promise(resolve => setTimeout(resolve, 0)); 
                }
            }

            // Generate and download ZIP
            progressText.textContent = 'Generating ZIP file...';
            try {
                const content = await zip.generateAsync({ type: "blob" });
                
                // Create download link
                const url = window.URL.createObjectURL(content);
                const a = document.createElement("a");
                a.style.display = "none";
                a.href = url;
                a.download = `converted_emails_${Date.now()}.zip`;
                document.body.appendChild(a);
                a.click();
                
                // Cleanup
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                
                progressText.textContent = 'Complete! ZIP downloaded.';
                convertBtn.textContent = 'Convert & Download ZIP';
                convertBtn.disabled = false;
                
            } catch (error) {
                console.error("Error generating zip:", error);
                progressText.textContent = 'Error generating ZIP.';
                progressText.classList.add('text-red-500');
            }
        }
    </script>
</body>
</html>
